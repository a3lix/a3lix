name = "a3lix-worker"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "A3LIX_KV"
id = "00f93e247ff3499681aff66fcba5f705"
preview_id = "00f93e247ff3499681aff66fcba5f705"

[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"

[triggers]
crons = ["*/1 * * * *"]

# Secrets (set via `wrangler secret put`):
# GITHUB_TOKEN          - Fine-grained GitHub PAT (repo contents + workflows)
# TELEGRAM_BOT_TOKEN    - From @BotFather
# TELEGRAM_SECRET_TOKEN - Random string to verify webhook requests
# AI_API_KEY            - Only needed if using non-Workers-AI provider
# CF_ACCOUNT_ID         - REQUIRED; Cloudflare account id for Pages deployment status polling
# CF_API_TOKEN          - REQUIRED; API token with Pages read access for deployment polling
